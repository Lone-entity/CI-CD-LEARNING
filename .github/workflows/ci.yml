name: Microservices CI

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api-gateway, user-service, contact-service, chat-service, group-service, notification-service, analytics-service, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Lowercase repository name
        id: string
        run: |
          echo "repo_lower=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          # Generates both the latest tag and a unique tag for tracking versions
          tags: |
            ghcr.io/${{ steps.string.outputs.repo_lower }}/${{ matrix.service }}:latest
            ghcr.io/${{ steps.string.outputs.repo_lower }}/${{ matrix.service }}:${{ github.sha }}