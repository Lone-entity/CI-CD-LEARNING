{{- range .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata: { name: {{ .name }} }
spec:
  replicas: 1
  selector: { matchLabels: { app: {{ .name }} } }
  template:
    metadata: { labels: { app: {{ .name }} } }
    spec:
      containers:
        - name: {{ .name }}
          image: ghcr.io/your-org/{{ .name }}:latest
          ports: [ { containerPort: {{ .port }} } ]
---
apiVersion: v1
kind: Service
metadata: { name: {{ .name }} }
spec:
  selector: { app: {{ .name }} }
  ports: [ { protocol: TCP, port: {{ .port }}, targetPort: {{ .port }} } ]
---
{{- end }}